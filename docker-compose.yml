version: '3.8'

services:
  neo4j:
    image: neo4j:5.15.0
    container_name: cocom_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/cocom_secure_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 2G
      NEO4J_dbms_memory_heap_max__size: 4G
    volumes:
      - cocom_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p cocom_secure_password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  runner:
    build: .
    container_name: cocom_runner
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=cocom_secure_password
    volumes:
      - .:/app
    stdin_open: true
    tty: true

volumes:
  cocom_neo4j_data:
